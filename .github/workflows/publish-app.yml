name: publish

on:
  push:
    branches: [ main ]

env:
  PROJECT_PATH: 'Necroperator/Necroperator.csproj'
  DOTNET_VERSION: '9.0.x'
  RUNTIME: 'win-x64'
  RELEASE_TAG: v1.0.${{ github.run_number }}

jobs:
  publish:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }} --runtime ${{ env.RUNTIME }}

    - name: Build project
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore --runtime ${{ env.RUNTIME }}
  
    - name: Publish project
      run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --runtime ${{ env.RUNTIME }}  --no-build --output ./publish --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false

    - name: Create artifact
      shell: pwsh
      run: |
        $files = Get-ChildItem ./publish -File -Recurse -Exclude *.pdb
        Compress-Archive -Path $files.FullName -DestinationPath ./Necroperator.zip

    - name: Create release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        files: ./Necroperator.zip
