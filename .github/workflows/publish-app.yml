name: publish

on:
  push:
    branches: [ main ]

env:
  PROJECT_PATH: 'Necroperator/Necroperator.csproj'
  DOTNET_VERSION: '9.0.x'
  RUNTIME: 'win-x64'

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }} --runtime ${{ env.RUNTIME }}

    - name: Build project
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore --runtime ${{ env.RUNTIME }}
  
    - name: Publish project
      run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --self-contained --runtime ${{ env.RUNTIME }} -p:PublishSingleFile=true --no-build

    - name: Create release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.run_number }}
        files: |
          publish/*.dll
          publish/*.exe
